name: Feature request
description: Suggest a new Forge capability or workflow.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is painful today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would a good solution look like?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - absorption pipeline
        - LLM iterate/evolve
        - chat/copilot
        - docs/test generation
        - JavaScript/TypeScript support
        - CLI UX
        - CI/GitHub integration
        - other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any workaround or alternative design you considered?
